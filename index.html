<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#f9f9f7">
  <title>Lukas Juhas</title>

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400&text=lukas%20juhas%20github%20linkedin&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400&text=lukas%20juhas%20github%20linkedin&display=swap">
  </noscript>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      background: #f9f9f7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      text-align: center;
    }

    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 400;
      color: #111;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 2.75rem;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.25rem;
    }

    nav a {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(17, 17, 17, 0.62);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.15s ease;
    }

    nav a:hover {
      color: #111;
    }

    nav a:focus-visible {
      outline: 1.5px solid #111;
      outline-offset: 4px;
      border-radius: 2px;
    }
  </style>
</head>

<body>
  <main>
    <h1>lukas juhas</h1>
    <nav aria-label="External profiles">
      <a href="https://github.com/lukasjuhas/" target="_blank" rel="noopener noreferrer"
        aria-label="GitHub, opens in a new tab">github</a>
      <a href="https://www.linkedin.com/in/lukasjuhas/" target="_blank" rel="noopener noreferrer"
        aria-label="LinkedIn, opens in a new tab">linkedin</a>
    </nav>
  </main>
</body>

</html>
